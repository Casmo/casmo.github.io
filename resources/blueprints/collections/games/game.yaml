title: Game
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
          -
            handle: name
            field:
              type: text
              validate:
                - required
              display: Name
          -
            handle: capsule
            field:
              container: assets
              max_files: 1
              type: assets
              display: Capsule
              instructions: 'Steam main capsule image: 1232x 706px'
              instructions_position: below
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
